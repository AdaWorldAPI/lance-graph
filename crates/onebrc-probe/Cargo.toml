[package]
name = "onebrc-probe"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
publish = false
description = "1BRC (One Billion Row Challenge) substrate probe: measures the V3 SoA/mailbox substrate's groupby-aggregate throughput at container scale (100M rows). Lane A (single-thread scalar baseline) and Lane C (std::thread parallel baseline) ship here; Lane B (ndarray SIMD), Lane D (ractor actors), Lane E (kanban) are follow-up work — see README.md."

# Standalone, workspace-EXCLUDED crate (see root Cargo.toml `exclude`, same
# precedent as crates/bgz17 and crates/deepnsm). Zero dependencies for lanes
# A/C (std only). Verify with:
#   cargo test --manifest-path crates/onebrc-probe/Cargo.toml

# Empty [workspace] table: this crate is `exclude`d from the parent
# lance-graph workspace, but cargo's manifest auto-discovery would otherwise
# walk up from a nested worktree and pick up the outer workspace root
# (identical precedent/comment to crates/deepnsm/Cargo.toml).
[workspace]

[dependencies]

[dev-dependencies]
