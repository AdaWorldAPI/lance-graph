[package]
name = "surreal_container"
version = "0.1.0"
edition = "2021"
rust-version = "1.82"
license = "Apache-2.0"
publish = false
description = """
Embedded SurrealDB-on-Lance cognitive store.

Opens an in-process `surrealdb` Datastore backed by the `kv-lance` storage
engine (the AdaWorldAPI fork feature, NOT upstream surrealdb).  Provides the
substrate that all surreal_container tasks (write, read, catalog, cache, …)
build on.

Depends on task 01 (deps_substrate) being resolved before compiling.
"""

# ── BLOCKED(C): FULLY RESOLVED 2026-06-14 (coordinates verified against the fork) ──
#
# All coordinates confirmed by reading github.com/AdaWorldAPI/surrealdb via GH_TOKEN+REST
# (the scoped git PROXY denies it, but github.com w/ token reaches any fork — the earlier
# "inaccessible" / "session-auth" framing was wrong):
#   • git URL = https://github.com/AdaWorldAPI/surrealdb        ✅
#   • branch  = feat/sdk-forward-kv-lance                       ✅ (Lance KV backend is
#     INTEGRATED here at surrealdb/core/src/kvs/lance/{mod,schema,timeline,tx_buffer,
#     background_optimizer,cnf,tests}.rs — not WIP, fully present on this branch)
#   • feature = kv-lance                                        ✅ (surrealdb/core/Cargo.toml:27
#     `kv-lance = ["dep:lance","dep:lance-index","dep:lancedb","dep:arrow-array","dep:arrow-schema"]`)
#
# The fork ALREADY pulls our stack (its Cargo.lock pins): lance-graph-contract 0.1.0,
# lance 6.0.0, lance-index 6.0.0, lancedb 0.29.0, ndarray 0.16.1 + 0.17.2. So this is NOT
# a from-scratch integration — the deps are wired in the fork.
#
# REAL REMAINING ITEM = version reconcile (NOT access, branch, or feature):
#   fork pins lance 6.0.0 / lancedb 0.29.0 ; this crate pins lance =7.0.0 / lancedb =0.30.0.
#   Align the workspace on ONE lance/lancedb line before building (the lance family moves
#   in lockstep). Then build-verify (cargo git-fetches the fork; mind the SurrealDB
#   cold-build disk cost). Until aligned, the dep stays commented so the manifest resolves.

[dependencies]
# ── BLOCKED(C) RESOLVED: uncomment once lance/lancedb are aligned across the workspace
#    (fork is 6.0.0/0.29.0; this crate is 7.0.0/0.30.0) — see note above ──────────
# surrealdb = { git = "https://github.com/AdaWorldAPI/surrealdb", branch = "feat/sdk-forward-kv-lance", default-features = false, features = ["kv-lance"] }

lance    = "=7.0.0"
lancedb  = { version = "=0.30.0", optional = true, default-features = false }

# Runtime support (not blocked — these are well-known, confirmed versions)
tokio    = { version = "1", features = ["rt-multi-thread", "macros"] }
futures  = "0.3"
snafu    = "0.8"

[features]
default = []
# lancedb-sdk: expose the high-level LanceDB table/connection surface.
# Optional: surreal_container can operate via raw lance without the SDK.
lancedb-sdk = ["dep:lancedb"]

[dev-dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
tempfile = "3"
