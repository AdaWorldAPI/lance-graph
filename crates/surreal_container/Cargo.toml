[package]
name = "surreal_container"
version = "0.1.0"
edition = "2021"
rust-version = "1.82"
license = "Apache-2.0"
publish = false
description = """
Embedded SurrealDB-on-Lance cognitive store.

Opens an in-process `surrealdb` Datastore backed by the `kv-lance` storage
engine (the AdaWorldAPI fork feature, NOT upstream surrealdb).  Provides the
substrate that all surreal_container tasks (write, read, catalog, cache, …)
build on.

Depends on task 01 (deps_substrate) being resolved before compiling.
"""

# ── BLOCKED(C): RESOLVED 2026-06-16 (fork lance/lancedb pins aligned to workspace) ──
#
# Coordinates confirmed against the fork (github.com/AdaWorldAPI/surrealdb):
#   • git URL = https://github.com/AdaWorldAPI/surrealdb        ✅
#   • branch  = main                                            ✅ (was feat/sdk-forward-kv-lance;
#     PRs #34 (ndarray pin) / #35 (SDK kv-lance forwarding) / #36 (Lance backend struct +
#     endpoint helper) / #37 (C16c bridge From<op_surreal_ast::*> for catalog::*) ALL
#     merged to main; lance/lance-index =7.0.0 + lancedb =0.30.0 since 2026-06-16)
#   • feature = kv-lance                                        ✅ (surrealdb/core/Cargo.toml:27
#     `kv-lance = ["dep:lance","dep:lance-index","dep:lancedb","dep:arrow-array","dep:arrow-schema"]`)
#
# Version reconcile DONE: surrealdb fork now pins lance =7.0.0 / lance-index =7.0.0 /
# lancedb =0.30.0 (matches this workspace). PR #34 also pinned ndarray fork exact-rev.
# Unblocks D-PG-6 (Rubicon kanban VIEW), D-MBX-9 OUT (LanceVersionScheduler over
# versions() — shipped in lance-graph::graph::scheduler), identity-architecture Phase H
# (SurrealQL read glove). See TD-SURREALDB-KVLANCE-LANCE7 closure note.
#
# OPERATIONAL NOTE: uncommenting the dep below triggers a cold surrealdb build (~hundreds
# of crates, ~10+ min cold). This crate keeps the surrealdb dep commented so default
# `cargo check` stays fast for non-surreal contributors; the kv-lance integrator
# uncomments it in their branch and takes the cold-build cost. The contract-side
# adapter (`view.rs`) ships independently and depends only on lance-graph-contract.

[dependencies]
# ── BLOCKED(C) RESOLVED 2026-06-16: surrealdb fork now aligned at lance=7.0.0 /
# lancedb=0.30.0 (PR #34/#35/#36/#37 merged to main). Uncomment to wire kv-lance
# real I/O — note the cold-build cost (~10+ min for the surrealdb crate graph).
# Until uncommented, the contract-side `view.rs` adapter compiles and ships
# the MailboxSoaView surface with a documented `BlockedColdBuild` stub.
# surrealdb = { git = "https://github.com/AdaWorldAPI/surrealdb", branch = "main", default-features = false, features = ["kv-lance"] }

# Contract types the view glove (`view.rs`) implements.
lance-graph-contract = { path = "../lance-graph-contract" }

lance    = "=7.0.0"
lancedb  = { version = "=0.30.0", optional = true, default-features = false }

# Runtime support (not blocked — these are well-known, confirmed versions)
tokio    = { version = "1", features = ["rt-multi-thread", "macros"] }
futures  = "0.3"
snafu    = "0.8"

[features]
default = []
# lancedb-sdk: expose the high-level LanceDB table/connection surface.
# Optional: surreal_container can operate via raw lance without the SDK.
lancedb-sdk = ["dep:lancedb"]

[dev-dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
tempfile = "3"
