[package]
name = "surreal_container"
version = "0.1.0"
edition = "2021"
rust-version = "1.82"
license = "Apache-2.0"
publish = false
description = """
Embedded SurrealDB-on-Lance cognitive store.

Opens an in-process `surrealdb` Datastore backed by the `kv-lance` storage
engine (the AdaWorldAPI fork feature, NOT upstream surrealdb).  Provides the
substrate that all surreal_container tasks (write, read, catalog, cache, …)
build on.

Depends on task 01 (deps_substrate) being resolved before compiling.
"""

# ── BLOCKED(C): PARTIALLY RESOLVED 2026-06-14 — repo + feature known; branch + session-auth pending ──
#
# The `kv-lance` feature is NOT in upstream surrealdb on crates.io.
# It lives in the AdaWorldAPI fork (core/src/kvs/lance/{wal,memtable,flusher,mod}.rs).
#
# Operator-supplied (2026-06-14), per the AdaWorldAPI/<name> fork convention:
#   1. git URL  = https://github.com/AdaWorldAPI/surrealdb   ✅ RESOLVED
#   2. branch/tag holding `kv-lance`                          ⛳ STILL UNKNOWN (the note's
#      earlier `kv-lance-v2` was a guess; confirm via the fork's branch list).
#   3. feature flag = `kv-lance`                              ✅ confirmed (the fork feature name).
#
# REMAINING BLOCKER (new, session-level): the `AdaWorldAPI/surrealdb` repo is NOT in
# THIS session's git scope (proxy → 502 "repository not authorized"; ndarray/lance-graph/
# turbovec only), and no `add_repo`/`list_repos` tool is available here to widen it. So
# the dep cannot be fetched / built / verified from this session. Wire + build it in a
# session where the repo IS authorized (and mind the cold-build disk cost — SurrealDB is
# one of the largest Rust dep trees). NOTE the eventual line uses NO `branch=` only if the
# default branch carries `kv-lance`; otherwise pin item 2.

[dependencies]
# ── BLOCKED(C): repo+feature known (above); uncomment once the branch is confirmed AND
#    the AdaWorldAPI/surrealdb repo is authorized in the build session ──────────
# surrealdb = { git = "https://github.com/AdaWorldAPI/surrealdb", branch = "<confirm: kv-lance branch>", default-features = false, features = ["kv-lance"] }

lance    = "=7.0.0"
lancedb  = { version = "=0.30.0", optional = true, default-features = false }

# Runtime support (not blocked — these are well-known, confirmed versions)
tokio    = { version = "1", features = ["rt-multi-thread", "macros"] }
futures  = "0.3"
snafu    = "0.8"

[features]
default = []
# lancedb-sdk: expose the high-level LanceDB table/connection surface.
# Optional: surreal_container can operate via raw lance without the SDK.
lancedb-sdk = ["dep:lancedb"]

[dev-dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
tempfile = "3"
