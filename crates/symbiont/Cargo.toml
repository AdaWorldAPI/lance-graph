# Portable golden-image probe — EXCLUDED from the lance-graph workspace.
#
# THE one and only way the full Ada stack is meant to compile+link as one
# binary: lance-graph + lance =7.0.0 + lancedb =0.30.0 + ndarray fork +
# ractor fork + surrealdb (kv-lance only) + OGAR.
#
# This manifest is SELF-CONTAINED via git deps to the AdaWorldAPI forks (pinned
# to the `claude/jirak-math-theorems-harvest-rfii13` branch) so it resolves in
# any session and on Railway/CI — no machine-specific paths. The two same-repo
# crates (lance-graph, perturbation-sim) stay path deps.
#
# Build locally:   cargo build --manifest-path crates/symbiont/Cargo.toml
# Build container: docker build -f crates/symbiont/Dockerfile -t symbiont .
#                  (from the lance-graph repo root — see Dockerfile + README)
#
# NOTE: lance-graph's own Cargo.toml path-deps the ndarray fork as a SIBLING
# (`../../../ndarray`), so a from-scratch build needs the ndarray fork checked
# out next to lance-graph. In a session it already is; the Dockerfile clones it.

[package]
name = "symbiont"
version = "0.0.0"
edition = "2021"
publish = false
description = "Golden-image probe: the full Ada stack (lance-graph + lance7/lancedb0.30 + ndarray + ractor + surrealdb kv-lance + OGAR) compiled into ONE binary. Portable git-deps build for any session + Railway/CI."

# Own workspace root — keeps this crate out of the parent lance-graph workspace
# AND makes the [patch] below take effect.
[workspace]

[[bin]]
name = "symbiont"
path = "src/main.rs"

[dependencies]
# ── same-repo crates: path deps ──
lance-graph = { path = "../lance-graph" }
perturbation-sim = { path = "../perturbation-sim" }
# canonical SoA node (NodeRow/NodeGuid/EdgeBlock) — NOT re-exported by lance-graph,
# so the D1 bridge names it directly. Zero-dep, already in the graph.
lance-graph-contract = { path = "../lance-graph-contract" }
# ndarray fork — direct, for the AMX BF16 tile GEMM (bf16_tile_gemm_16x16) +
# amx_available() the Domino POC drives. Already in the graph via lance-graph.
ndarray = { path = "../../../ndarray" }

# ── external AdaWorldAPI forks: git deps ──
# ractor: jirak branch (carries this session's MessagingErr::Saturated fix; on github).
# surrealdb + OGAR: `main` — each fork's jirak HEAD is an ANCESTOR of its main
# (main is the canonical superset), and kv-lance lives on surrealdb main. Pinning
# surrealdb to main matches OGAR's own surrealdb pin, so they resolve to ONE source.
ractor = { git = "https://github.com/AdaWorldAPI/ractor", branch = "claude/jirak-math-theorems-harvest-rfii13" }
surrealdb-core = { git = "https://github.com/AdaWorldAPI/surrealdb", branch = "main", default-features = false, features = ["kv-lance"] }
# OGAR tracks `main` (its jirak commit 3016c78 is an ancestor of main — main is a
# strict superset; there is no separate OGAR jirak branch on github).
ogar-vocab = { path = "../../../OGAR/crates/ogar-vocab" }
ogar-ontology = { path = "../../../OGAR/crates/ogar-ontology" }
ogar-adapter-surrealql = { path = "../../../OGAR/crates/ogar-adapter-surrealql", features = ["surrealdb-parser"] }

# The OGAR activation crate (in-repo, path) — the golden image's whole point is to
# prove the FULL AR surface links: ogar-class-view's `impl lance_graph_contract::
# ClassView` + the codebook parity-guard, not just raw ogar-vocab. Pulling this
# crate (which transitively pulls ogar-class-view) is what makes the unified binary
# exercise the Active-Record bridge. features=["surrealql-parser"] matches the
# ogar-adapter-surrealql parser pin above (one surrealdb#main source).
lance-graph-ogar = { path = "../lance-graph-ogar", features = ["surrealql-parser"] }

# ── [patch] — unify lance-graph-contract to the ONE in-repo path copy ──
# CONSUMER REQUIREMENT (codex P2, PR #564): `ogar-class-view` (pulled via
# lance-graph-ogar) hard-git-deps `lance-graph-contract` @ AdaWorldAPI/lance-graph#main,
# while this crate + lance-graph path-dep it. Cargo treats path and git as DISTINCT
# crates even at the same version, so without this patch `OgarClassView` would impl
# a DIFFERENT `ClassView` than the engine expects (won't typecheck). The patch
# folds the git contract onto the path copy = exactly one contract source.
# (Applies here because symbiont is the workspace root; lance-graph-ogar's own
# identical patch is ignored when it is not the root.)
[patch."https://github.com/AdaWorldAPI/lance-graph"]
lance-graph-contract = { path = "../lance-graph-contract" }

# No surrealdb [patch] needed: this crate's surrealdb-core and OGAR's transitive
# surrealdb (ast/parser/core) all resolve to https://github.com/AdaWorldAPI/surrealdb#main
# — ONE source — and cargo unions the features so kv-lance is enabled on the shared
# surrealdb-core. (cargo forbids patching a git URL to the same git URL, which is
# why the earlier jirak-redirect patch failed; aligning on main removes the need.)
