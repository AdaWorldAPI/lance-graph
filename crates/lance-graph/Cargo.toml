[package]
name = "lance-graph"
version = "0.5.4"
edition = "2021"
license = "Apache-2.0"
authors = ["Lance Devs <dev@lancedb.com>"]
repository = "https://github.com/lancedb/lance-graph"
readme = "README.md"
description = "Graph query engine for Lance datasets with Cypher support"
keywords = ["lance", "graph", "cypher", "query", "datafusion"]
categories = ["database", "data-structures", "science"]

[dependencies]
# arrow + datafusion bumped to 58 + 53 to align with lance 6.0's transitive versions.
# TODO(lance-bump): downstream crates may need follow-up to align.
arrow = { version = "58", features = ["prettyprint"] }
arrow-array = "58"
arrow-schema = "58"
chrono = "0.4"
async-trait = "0.1"
datafusion = { version = "53", default-features = false, features = [
    "nested_expressions",
    "regex_expressions",
    "unicode_expressions",
    "crypto_expressions",
    "encoding_expressions",
    "datetime_expressions",
    "string_expressions",
    "parquet",
] }
datafusion-common = "53"
datafusion-expr = "53"
datafusion-sql = "53"
datafusion-functions-aggregate = "53"
futures = "0.3"
lance-graph-catalog = { path = "../lance-graph-catalog", version = "0.5.4" }
lance-graph-contract = { path = "../lance-graph-contract" }
lance = "=7.0.0"
lance-linalg = "=7.0.0"
lance-namespace = "=7.0.0"
lancedb = { version = "=0.30.0", optional = true, default-features = false }
nom = "7.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bytes = "1"
snafu = "0.8"
deltalake = { version = "0.32", features = ["datafusion", "s3", "azure", "gcs"], optional = true }
url = { version = "2", optional = true }

# AdaWorldAPI/ndarray fork with 55 HPC modules (Fingerprint, CAM-PQ, CLAM, BLAS, ZeckF64)
# Source: https://github.com/AdaWorldAPI/ndarray
ndarray = { path = "../../../ndarray", optional = true, default-features = false, features = ["std", "hpc-extras"] }

# Unified query planner (MUL, thinking, strategies, CAM-PQ scan)
lance-graph-planner = { path = "../lance-graph-planner", optional = true }

# bgz17: palette semiring codec (0 deps, 121 tests)
bgz17 = { path = "../bgz17", optional = true }

# bgz-tensor: attention as table lookup, SimilarityTable, variance audit
bgz-tensor = { path = "../bgz-tensor", optional = true }

[features]
default = ["unity-catalog", "ndarray-hpc", "planner", "bgz17-codec", "tensor-codec"]
unity-catalog = ["lance-graph-catalog/unity-catalog"]
# TODO(lance-bump-delta): deltalake 0.32 removed `DeltaTableProvider::try_new`;
# new API is `TableProviderBuilder::new().with_snapshot(...).with_log_store(...).build().await`.
# Refactor `table_readers.rs::DeltaTableReader` to the new builder API in a
# follow-up PR. Dropped from `default` features for now so CI stays green on
# the lance/lancedb bump; still opt-in via `--features delta` if a caller
# accepts the broken state.
delta = ["dep:deltalake", "dep:url"]
# lancedb: high-level table/connection API (Python/JS SDK equivalent in Rust).
# Enables LanceDB-compatible connection strings, table management, and the
# vector search API surface that third-party tooling (DuckDB ext, Polars) expects.
lancedb-sdk = ["dep:lancedb"]
# ndarray-hpc: use AdaWorldAPI/ndarray for Fingerprint<256>, CAM-PQ, CLAM, BLAS, ZeckF64.
# Disable for minimal builds (CI, wasm, embedded) — falls back to standalone ndarray_bridge.rs.
ndarray-hpc = ["dep:ndarray"]
# with-cam-pq: enables WitnessIndexCamPq (real ndarray::hpc::cam_pq wiring) in WitnessCorpus.
# Requires ndarray-hpc. HashMap-only users (no with-cam-pq) pay zero cost — no ndarray dep
# for the witness index path unless this feature is enabled.
# OQ-CSV-12: lazy enable_cam_pq() API; WitnessCorpus::new() stays cheap.
with-cam-pq = ["ndarray-hpc"]
# planner: wire lance-graph-planner for query classification, thinking styles, MUL gate.
planner = ["dep:lance-graph-planner"]
# bgz17-codec: palette semiring, HHTL distance matrix, SPO tripartite search.
bgz17-codec = ["dep:bgz17"]
# tensor-codec: attention as table lookup, SimilarityTable, Belichtungsmesser, variance audit.
tensor-codec = ["dep:bgz-tensor"]
# lite-unified: ADDITIVE, default-OFF coexistence gate for the SurrealQL-on-lance
# query path (.claude/plans/lite-unified-surrealql-lance-v1.md). PROCESS, NOT A
# SWITCH — datafusion stays the DEFAULT query engine and is NOT deprecated, NOT
# made optional by this feature. `lite-unified` only adds the SurrealQL lowering
# path ALONGSIDE datafusion, promoted gradually per query-shape once OQ-LU-2a
# (the datafusion_planner coverage probe) is green. Empty until the lowering lands.
lite-unified = []

[dev-dependencies]
futures = "0.3"
lance-arrow = "=7.0.0"
lance-index = "=7.0.0"
tempfile = "3"
tokio = { version = "1.37", features = ["macros", "rt-multi-thread"] }
causal-edge = { path = "../causal-edge" }
lance-graph-planner = { path = "../lance-graph-planner" }
