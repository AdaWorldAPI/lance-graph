[package]
name = "neural-debug"
version = "0.1.0"
edition = "2021"
description = "Neural debugger: static analysis + runtime instrumentation for the graph engine stack"
license = "Apache-2.0"

[[bin]]
name = "neural-scan"
path = "src/main.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
walkdir = "2"
regex = "1"
