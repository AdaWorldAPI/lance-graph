[workspace]
members = [
    "crates/lance-graph",
    "crates/lance-graph-catalog",
    "crates/lance-graph-benches",
    "crates/lance-graph-planner",
    "crates/lance-graph-contract",
    "crates/neural-debug",
    "crates/lance-graph-callcenter",
    "crates/lance-graph-archetype",
    "crates/lance-graph-rbac",
    "crates/lance-graph-ontology",
    "crates/bgz-tensor",
    "tools/dto-class-check",
    "crates/lance-graph-consumer-conformance",
    # PR-G2 (TD-RACTOR-SUPERVISOR-5): ractor-supervised callcenter actor tree
    "crates/lance-graph-supervisor",
    "crates/sigma-tier-router",
    # TD-SHADER-DRIVER-WORKSPACE-CONFLICT-1: moved from exclude to members
    "crates/cognitive-shader-driver",
]
exclude = [
    # Sprint-0 scaffold stubs from the four-repo integration plan; promote to
    # members once their heavy deps (tikv-client, ractor) compile cleanly
    # in the workspace. See .claude/plans/integration-plan.md §5 and §6.
    "crates/lance-graph-tikv-provider",
    "crates/cognitive-shader-actor",
    # End-to-end integration demo (wave-5 W-INT-1). Excluded so the heavy
    # tokio/ractor/arrow deps don't grow the workspace check; it's a
    # standalone runnable consumer of the contract + glue crates.
    "crates/four-repo-demo",
    "crates/four-repo-demo",
    # Python bindings (upstream-inherited, opt-in via --manifest-path)
    "crates/lance-graph-python",
    "crates/lance-graph-codec-research",
    "crates/bgz17",
    "crates/deepnsm",
    "crates/lance-graph-osint",
    "crates/reader-lm",
    "crates/bge-m3",
    "crates/p64-bridge",
    "crates/causal-edge",
    "crates/highheelbgz",
    "crates/thinking-engine",
    "crates/holograph",
    "crates/lance-graph-cognitive",
    "crates/learning",
    "crates/jc",
    "crates/sigker",
]
resolver = "2"
