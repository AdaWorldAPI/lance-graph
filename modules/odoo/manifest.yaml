ogit_g: ODOO
version: 1
domain_name: odoo
inert_when_consumer_absent: false

entity_types:
  Partner:           u16=4300
  PartnerCompany:    u16=4301
  PartnerIndividual: u16=4302
  AccountMove:       u16=4303
  AccountMoveLine:   u16=4304
  Account:           u16=4305
  AccountTax:        u16=4306
  AccountJournal:    u16=4307
  Product:           u16=4308
  ProductTemplate:   u16=4309
  ProductCategory:   u16=4310
  StockMove:         u16=4311
  StockPicking:      u16=4312
  MailMessage:       u16=4313
  MailTemplate:      u16=4314
  HrEmployee:        u16=4315
  HrAttendance:      u16=4316

rbac_policy: odoo_policy

stack_profile:
  audit_retention_days: 3650
  requires_fail_closed: true
  escalation: llm

action_capabilities:
  post_journal_entry:      escalate
  validate_invoice:        escalate
  reconcile_payment:       escalate
  delete_partner:          escalate
  export_xml_invoice:      escalate
  create_partner:          permit_with_audit
  update_partner:          permit_with_audit
  compute_tax:             permit_with_audit
  create_journal_entry:    permit_with_audit
  generate_pdf_invoice:    permit_with_audit
  send_invoice_email:      permit_with_audit
  read_partner_balance:    permit_with_audit
  read_partner:            permit
  read_product:            permit
  read_account:            permit

actor:
  crate: odoo-rs
  type: OdooActor
  message_type: OdooMessage

inherits_from: fibofnd
